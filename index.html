<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Baby Safety System</title>
  <link href="style.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <script src="script.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>👶 Smart Baby Safety Monitor</h1>
    <div class="card-grid">
      <div class="card">
        <h2>🌡️ Temperature</h2>
        <p id="temperature">-- °C</p>
      </div>
      <div class="card">
        <h2>💧 Humidity</h2>
        <p id="humidity">-- %</p>
      </div>
      <div class="card">
        <h2>🔊 Sound Level</h2>
        <p id="sound">-- dB</p>
      </div>
    </div>
  </div>
</body>
</html>
